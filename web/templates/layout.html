{{define "layout"}}<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>{{.Title}} · cc-license</title>
  <style>
    :root {
      --bg: #f5f7fb;
      --panel: #ffffff;
      --line: #e5e7eb;
      --text: #0f172a;
      --muted: #64748b;
      --accent: #2563eb;
      --accent-hover: #1d4ed8;
      --ok-bg: #ecfdf5;
      --ok-border: #10b981;
      --ok-text: #065f46;
      --err-bg: #fef2f2;
      --err-border: #ef4444;
      --err-text: #991b1b;
      --code-bg: #f8fafc;
      --shadow: 0 1px 2px rgba(15, 23, 42, 0.04), 0 1px 3px rgba(15, 23, 42, 0.06);
    }
    * { box-sizing: border-box; }
    body { margin:0; font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif; background: var(--bg); color: var(--text); -webkit-font-smoothing: antialiased; }
    header { background: var(--panel); border-bottom: 1px solid var(--line); padding: 14px 24px; display:flex; align-items:center; gap:24px; box-shadow: var(--shadow); }
    header h1 { margin:0; font-size: 17px; letter-spacing: -0.01em; }
    nav a { color: var(--muted); text-decoration:none; margin-right: 18px; font-size: 14px; font-weight: 500; transition: color 0.15s; }
    nav a:hover { color: var(--text); }
    nav a.active { color: var(--accent); }
    main { max-width: 940px; margin: 32px auto; padding: 0 24px; }
    .card { background: var(--panel); border: 1px solid var(--line); border-radius: 10px; padding: 24px; margin-bottom: 20px; box-shadow: var(--shadow); }
    h2 { margin-top: 0; margin-bottom: 8px; font-size: 18px; letter-spacing: -0.01em; }
    label { display:block; font-size: 13px; color: var(--muted); margin-bottom: 6px; margin-top: 14px; font-weight: 500; }
    input[type=text], input[type=number], input[type=datetime-local], textarea {
      width: 100%;
      background: #ffffff;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 10px 12px;
      color: var(--text);
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      font-size: 13px;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    input[type=text]:focus, input[type=number]:focus, input[type=datetime-local]:focus, textarea:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.15);
    }
    textarea { min-height: 120px; resize: vertical; }
    button, .btn {
      background: var(--accent);
      color: #ffffff;
      border: 0;
      border-radius: 8px;
      padding: 10px 18px;
      font-weight: 600;
      cursor: pointer;
      font-size: 14px;
      text-decoration: none;
      display: inline-block;
      margin-right: 8px;
      margin-top: 16px;
      transition: background 0.15s;
    }
    button:hover, .btn:hover { background: var(--accent-hover); }
    button.secondary, .btn.secondary {
      background: transparent;
      color: var(--accent);
      border: 1px solid var(--line);
    }
    button.secondary:hover, .btn.secondary:hover { background: var(--code-bg); }
    pre {
      background: var(--code-bg);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 12px 14px;
      overflow: auto;
      font-size: 12.5px;
      line-height: 1.6;
      color: var(--text);
    }
    .alert { padding: 12px 16px; border-radius: 8px; margin-bottom: 16px; font-size: 14px; }
    .alert.ok  { background: var(--ok-bg); border: 1px solid var(--ok-border); color: var(--ok-text); }
    .alert.err { background: var(--err-bg); border: 1px solid var(--err-border); color: var(--err-text); }
    .row { display:grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .muted { color: var(--muted); font-size: 13.5px; line-height: 1.55; margin: 0; }
    code { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; background: var(--code-bg); padding: 1px 6px; border-radius: 4px; font-size: 12.5px; }
  </style>
</head>
<body>
  <header>
    <h1>cc-license</h1>
    <nav>
      <a href="/"        class="{{if eq .Active "home"}}active{{end}}">Home</a>
      <a href="/genkey"  class="{{if eq .Active "genkey"}}active{{end}}">Generate Key</a>
      <a href="/sign"    class="{{if eq .Active "sign"}}active{{end}}">Sign</a>
      <a href="/verify"  class="{{if eq .Active "verify"}}active{{end}}">Verify</a>
    </nav>
  </header>
  <main>
    {{template "content" .}}
  </main>
</body>
</html>
{{end}}
